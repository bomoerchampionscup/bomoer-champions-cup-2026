<script>

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyQHERYPZBOZqI5uxzddGUPLPejHtJZBxZqpzSVIfEEOQ5H80dHPewbIUJzkucu0lX/exec'; // GANTI!

// Fungsi konversi file ke base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = error => reject(error);
  });
}

// Fungsi untuk membersihkan nomor WA (ambil angka saja)
function cleanPhoneNumber(phone) {
  return phone.replace(/[^0-9]/g, '');
}

// Validasi dan proses pendaftaran
async function prosesPendaftaran() {
  // Ambil elemen form
  const namaTim = document.getElementById('namaTim');
  const asalTim = document.getElementById('asalTim');
  const namaPendaftar = document.getElementById('namaPendaftar');
  const nowa = document.getElementById('nowa');
  const email = document.getElementById('email');
  const buktiTF = document.getElementById('buktiTF');
  const ktpFile = document.getElementById('ktpFile');
  
  // Ambil role
  const roleRadios = document.getElementsByName('role');
  let selectedRole = '';
  for (let radio of roleRadios) {
    if (radio.checked) {
      selectedRole = radio.value;
      break;
    }
  }

  // VALIDASI
  if (!namaTim.value.trim()) { alert('❌ Nama Tim wajib diisi!'); namaTim.focus(); return; }
  if (!namaPendaftar.value.trim()) { alert('❌ Nama Penanggung Jawab wajib diisi!'); namaPendaftar.focus(); return; }
  if (!nowa.value.trim()) { alert('❌ Nomor WhatsApp wajib diisi!'); nowa.focus(); return; }
  if (buktiTF.files.length === 0) { alert('❌ Upload bukti transfer wajib!'); buktiTF.focus(); return; }
  if (ktpFile.files.length === 0) { alert('❌ Upload scan KTP wajib!'); ktpFile.focus(); return; }

  // Tampilkan loading
  document.getElementById('loading').style.display = 'block';
  const btn = document.getElementById('btnDaftar');
  btn.disabled = true;
  btn.style.opacity = '0.5';

  try {
    // Konversi file
    const buktiBase64 = await fileToBase64(buktiTF.files[0]);
    const ktpBase64 = await fileToBase64(ktpFile.files[0]);

    // Siapkan data
    const payload = {
      namaTim: namaTim.value.trim(),
      asalTim: asalTim.value.trim() || '-',
      namaPendaftar: namaPendaftar.value.trim(),
      nowa: nowa.value.trim(),
      role: selectedRole,
      email: email.value.trim() || '-',
      buktiTF: buktiBase64,
      buktiTFName: buktiTF.files[0].name,
      buktiTFType: buktiTF.files[0].type,
      ktpFile: ktpBase64,
      ktpFileName: ktpFile.files[0].name,
      ktpFileType: ktpFile.files[0].type
    };

    console.log('Mengirim data ke:', APPS_SCRIPT_URL);
    
    // Kirim ke Apps Script
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload)
    });

    // Cek apakah response bisa di-parsing
    let result;
    try {
      result = await response.json();
    } catch (e) {
      // Jika response bukan JSON (misal: HTML error), anggap sukses karena file sudah terupload
      console.log('Response bukan JSON, tapi file kemungkinan sudah terkirim');
      result = { success: true };
    }
    
    console.log('Response:', result);
    
    // Jika sukses (atau kita anggap sukses)
    if (result.success) {
      // Reset form dulu
      document.getElementById('formPendaftaran').reset();
      
      // Sembunyikan loading

      // Tampilkan popup sukses MODERN
      const nomorWA = cleanPhoneNumber(nowa.value.trim());
      
      // Buat pesan untuk panitia
      const pesanPanitia = 
        `*KONFIRMASI PENDAFTARAN BCC 2026*%0A%0A` +
        `Halo panitia BCC (Hubudin), saya *${namaPendaftar.value.trim()}* dari tim *${namaTim.value.trim()}* ingin mengkonfirmasi pendaftaran.%0A%0A` +
        `*Data Pendaftaran:*%0A` +
        `🏆 Tim: ${namaTim.value.trim()}%0A` +
        `📍 Asal: ${asalTim.value.trim() || '-'}%0A` +
        `👤 PJ: ${namaPendaftar.value.trim()}%0A` +
        `📱 WA: ${nowa.value.trim()}%0A` +
        `👔 Sebagai: ${selectedRole}%0A%0A` +
        `Saya sudah melakukan upload bukti transfer dan KTP. Mohon segera dicek. Terima kasih.`;
      
      const waLinkPanitia = `https://wa.me/6281381191141?text=${pesanPanitia}`;
      
      // Buat popup
      const popup = document.createElement('div');
      popup.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(5px);
      `;
      
      popup.innerHTML = `
        <div style="
          background: linear-gradient(145deg, #1b4d2b, #2f7a3f);
          border: 5px solid #f8c13d;
          border-radius: 60px;
          padding: 30px;
          max-width: 500px;
          width: 90%;

          color: white;
          box-shadow: 0 20px 40px rgba(0,0,0,0.5);

        ">
          <div style="font-size: 80px; margin-bottom: 10px;">✅</div>

          <div style="background: #1f3729; border-radius: 40px; padding: 20px; margin: 20px 0; text-align: left;">
            <p style="margin: 8px 0;"><strong>🏆 Tim:</strong> ${namaTim.value.trim()}</p>
            <p style="margin: 8px 0;"><strong>👤 PJ:</strong> ${namaPendaftar.value.trim()}</p>
            <p style="margin: 8px 0;"><strong>📱 No. WA:</strong> ${nowa.value.trim()}</p>
          </div>
          
          <div style="background: #c29a2e; border-radius: 40px; padding: 15px; margin: 20px 0; color: #1a2a1a;">
            <p style="font-weight: bold; margin-bottom: 10px;">⚠️ LANGKAH SELANJUTNYA:</p>
            <p>1. Klik tombol di bawah untuk konfirmasi ke panitia</p>
            <p>2. WAJIB HADIR Technical Meeting:</p>
            <p>📅 Kamis, 19 Maret 2026, 14.00 WIB</p>
            <p>📍 Sekretariat BCC Dusun Karangsari</p>
          </div>
          
          <a href="${waLinkPanitia}" target="_blank" style="
            display: inline-block;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px 35px;
            border-radius: 60px;
            font-size: 22px;

            margin: 15px 0 10px;
            border: 3px solid white;
            transition: transform 0.2s;

          " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <i class="fab fa-whatsapp"></i> KONFIRMASI KE PANITIA
          </a>
          
          <p style="margin: 15px 0 5px; font-size: 14px; color: #ddd;">
            Atau hubungi langsung: wa.me/6281381191141

          <button onclick="this.closest('div').closest('div').remove()" style="
            background: transparent;

    } else {

      throw new Error(result.error || 'Gagal mendaftar');
    }

    popupError.innerHTML = `

        <h2 style="color: white; font-size: 28px; margin-bottom: 15px;">GAGAL MENDAFTAR</h2>
        
        <p style="margin: 15px 0;">Terjadi kendala teknis. Silakan hubungi panitia langsung.</p>
        
        <a href="https://wa.me/6281381191141?text=Halo%20panitia%20BCC,%20saya%20mau%20konfirmasi%20pendaftaran%20tapi%20terkendala%20error%20di%20form." target="_blank" style="
          display: inline-block;
          background: #25D366;
          color: white;
          text-decoration: none;
          padding: 15px 30px;
          border-radius: 60px;

        ">
          <i class="fab fa-whatsapp"></i> HUBUNGI PANITIA

        <button onclick="this.closest('div').closest('div').remove()" style="
          background: transparent;
          border: 2px solid white;

          padding: 8px 20px;
          border-radius: 40px;
          font-size: 16px;
          cursor: pointer;
        ">TUTUP</button>
      </div>
    `;
    
    document.body.appendChild(popupError);
    
  } finally {
    // Pastikan loading hilang
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}
</script>
